            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 更新分类
      tags:
      - 管理员私有方法
  /admin/problem-create:
    post:
      consumes:
      - multipart/form-data
      description: 创建问题
      parameters:
      - description: authorization
        in: header
        name: authorization
        required: true
        type: string
      - description: title
        in: formData
        name: title
        required: true
        type: string
      - description: content
        in: formData
        name: content
        required: true
        type: string
      - description: max_mem
        in: formData
        name: max_mem
        type: integer
      - description: max_runtime
        in: formData
        name: max_runtime
        type: integer
      - collectionFormat: csv
        description: category_ids
        in: formData
        items:
          type: string
        name: category_ids
        type: array
      - collectionFormat: csv
        description: test_cases
        in: formData
        items:
          type: string
        name: test_cases
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":200,\"data\":{\"count\":0,\"data\":[]}\'
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 创建问题
      tags:
      - 管理员私有方法
  /admin/problem-update:
    put:
      description: 更新问题

info:
  contact: {}
paths:
  /admin/category-create:
    post:
      description: 创建分类
      parameters:
      - description: authorization
        in: header
        name: authorization
        required: true
        type: string
      - description: name
        in: formData
        name: name
        required: true
        type: string
      - description: problem_ids
        in: formData
        name: problem_ids
        type: integer
      responses:
        "200":
          description: '{\"code\":200,\"data\":{\"count\":0,\"data\":[]}\'
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 创建分类
      tags:
      - 管理员私有方法
  /admin/category-delete:
    delete:
      description: 删除分类
      parameters:
      - description: authorization
        in: header
        name: authorization
        required: true
        type: string
      - description: identity
        in: query
        name: identity
        required: true
        type: string
      responses:
        "200":
          description: '{\"code\":200,\"data\":{\"count\":0,\"data\":[]}\'
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true

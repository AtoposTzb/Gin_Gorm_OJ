      summary: 删除分类
      tags:
      - 管理员私有方法
  /admin/category-list:
    get:
      description: 获取分类列表
      parameters:
      - description: authorization
        in: header
        name: authorization
        required: true
        type: string
      - description: page
        in: query
        name: page
        type: integer
      - description: size
        in: query
        name: size
        type: integer
      - description: keyword
        in: query
        name: keyword
        type: string
      responses:
        "200":
          description: '{\"code\":200,\"data\":{\"count\":0,\"data\":[]}\'

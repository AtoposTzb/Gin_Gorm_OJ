      - 管理员私有方法
  /admin/category-update:
    put:
      description: 更新分类
      parameters:
      - description: authorization
        in: header
        name: authorization
        required: true
        type: string
      - description: identity
        in: formData
        name: identity
        required: true
        type: string
      - description: name
        in: formData
        name: name
        required: true
        type: string
      - description: ParentId
        in: formData
        name: ParentId
        type: integer
      responses:
        "200":
          description: '{\"code\":200,\"data\":{\"count\":0,\"data\":[]}\'
